name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check for dependency conflicts
        run: pip check

      - name: Environment / import check
        run: python scripts/check_environment.py --strict

      - name: Syntax check
        run: python -m compileall -q src app scripts demos

      - name: Run tests
        run: pytest -q

  api-startup:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: models/all-MiniLM-L6-v2
          key: all-MiniLM-L6-v2-v1

      - name: Fetch embedding model
        run: python scripts/fetch_embedding_model.py

      - name: Start API and check health
        run: python scripts/check_api_startup.py
