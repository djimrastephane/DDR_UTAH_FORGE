# DDR vocabulary configuration
# -----------------------------------------------------------------------
# Edit this file to add new terms, abbreviations, or code labels.
# No code changes needed — vocab.py reloads this at import time.
#
# compound_terms: matched left-to-right, longest/most-specific first.
#   Each entry: {from: "source phrase", to: "canonical-form"}
#
# abbreviation_map: matched after compound substitution.
#   Each entry: {abbr: "ABBR", expands_to: "canonical-form"}
#   Set expands_to to null to drop the token entirely.
# -----------------------------------------------------------------------

min_token_len: 3

# ---------------------------------------------------------------------------
# Stop words
# English function words + DDR operational filler that carry no
# graph-edge information.
# ---------------------------------------------------------------------------
stop_words:
  # English function words
  - the
  - and
  - with
  - from
  - for
  - into
  - onto
  - upon
  - that
  - this
  - then
  - when
  - whilst
  - while
  - after
  - before
  - during
  - where
  - which
  - using
  - until
  - over
  - all
  - any
  - per
  - out
  - "off"
  - via
  - due
  - its
  - their
  - they
  - were
  - was
  - has
  - had
  - have
  - been
  - not
  - but
  - are
  - can
  - may
  - will
  - also
  - both
  - each
  - such
  - only
  - than
  - thus
  - once
  - well
  - good
  # Plain English words that appear as uppercase table headers
  - safety
  - data
  - checks
  # Positional / directional (too generic standalone)
  - down
  - back
  - above
  - below
  - lower
  - upper
  - mid
  - through
  - across
  - between
  - prior
  # Generic verbs — filler with no graph-edge value
  - note
  - notes
  - held
  - hold
  - concurrently
  - simultaneously
  - confirmed
  - observed
  - noted
  - recorded
  - commenced
  - continued
  - completed
  - performed
  - installed
  - removed
  - rigged
  - picked
  - pumped
  - bled
  - lined
  - monitored
  - opened
  - closed
  - laid
  - pulled
  - broke
  - staged
  - flushed
  - required
  - attempted
  - prepared
  - checked
  - set
  - setting
  - instruction
  - instructions
  - additional
  - associated
  - applicable
  - available
  - successful
  - successfully
  - approximately
  - approx
  - including
  - following
  - providing
  - correct
  - correctly
  - minutes
  - hours
  - seconds
  - stand
  - stands
  # Ubiquitous procedural terms — zero discrimination
  - job-safety-analysis
  # Too generic standalone — specific compound forms already captured
  - running
  - surface
  - equipment
  - increased
  - assembly
  - decrease
  - decreased
  - string

# ---------------------------------------------------------------------------
# Engineering unit tokens
